name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.0

      - name: Install
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck cli
        run: bun --cwd packages/cli run typecheck

      - name: Typecheck engine
        run: bun --cwd packages/engine run typecheck
